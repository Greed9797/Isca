        body {

            border-radius: 12px;
            overflow: hidden;
            position: relative;
            padding-bottom: 50%;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

            align-items: center;

            font-size: 14px;
            padding: 16px 32px;
            border-radius: 6px;
            text-decoration: none;
            transition: background 0.2s;

        .whatsapp-btn:hover { background: #128C7E; }
        .whatsapp-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .testimonials {

            max-width: 960px;

        }

        .testimonials h3 .accent { color: #F5A623; }
        .dep-swiper { padding-bottom: 52px !important; }

        .dep-swiper .swiper-pagination-bullet-active { opacity: 1; }
        .dep-swiper .swiper-button-prev,
        .dep-swiper .swiper-button-next {
            color: #F5A623;
            background: rgba(0,0,0,0.5);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            top: 45%;
        }
        .dep-swiper .swiper-button-prev::after,
        .dep-swiper .swiper-button-next::after { font-size: 14px; font-weight: 900; }

        footer {
            background: #111;
            border-top: 1px solid #222;
            padding: 24px;
            text-align: center;
        }
        footer p { color: #666; font-size: 13px; }

            main { padding: 24px 8px 40px; }
